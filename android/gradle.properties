# نقل الكاش للـ E
gradle.user.home=E:/gradle

# إعدادات الذاكرة - محسّنة للأجهزة ذات الموارد المحدودة
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=256m -XX:+UseSerialGC -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=true
org.gradle.caching=true
org.gradle.workers.max=1

kotlin.incremental=false

android.useAndroidX=true
android.enableJetifier=false

kotlin.code.style=official
android.suppressUnsupportedCompileSdkHighlight=true