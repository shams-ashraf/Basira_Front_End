name: voice_test
description: "Voice + TFLite demo"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  tflite_flutter: ^0.12.1
  image: ^4.8.0
  webview_flutter: ^4.10.0

  http: ^1.2.0
  flutter_mjpeg: any
  google_mlkit_face_detection: ^0.13.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0

  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  uuid: ^4.4.0
  web_socket_channel: ^3.0.1
  flutter_local_notifications: ^17.2.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  google_generative_ai: ^0.4.6
  record: ^6.2.0
  just_audio: ^0.9.38
  google_mlkit_translation: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/mobilefacenet.tflite

dependency_overrides:
  http: ^1.2.0